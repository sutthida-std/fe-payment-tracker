<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE06 Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Kanit',sans-serif; background:linear-gradient(135deg,#FF6600 0%,#ff8c00 100%); display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; padding:20px; }
        .container { background:white; padding:30px 20px; border-radius:20px; box-shadow:0 15px 35px rgba(0,0,0,0.2); width:100%; max-width:350px; text-align:center; box-sizing:border-box; }
        h2 { color:#333; margin-bottom:20px; font-size:1.5rem; }
        input { width:100%; padding:12px; margin-bottom:15px; border:2px solid #eee; border-radius:10px; font-size:16px; box-sizing:border-box; transition:0.3s; }
        input:focus { border-color:#FF6600; outline:none; }
        button { width:100%; padding:14px; background:#FF6600; color:white; border:none; border-radius:10px; font-size:17px; font-weight:bold; cursor:pointer; transition:0.3s; }
        button:hover { background:#e65c00; transform:translateY(-2px); }
        #result { display:none; margin-top:20px; padding:15px; border-radius:12px; background:#fafafa; text-align:left; border-left:5px solid #FF6600; font-size:14px; line-height:1.6; } 
        .card { background:#fff; border:1px solid #eee; border-radius:10px; padding:12px; margin-top:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .paid { color:#28a745; font-weight:bold; }
        .pending { color:#dc3545; font-weight:bold; }
        .loading-text { font-size: 13px; color: #888; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Payment Status 🔍</h2>
    <input type="text" id="sid" placeholder="Student ID (6701XXXX)">
    <button onclick="check()">Verify Status</button>
    <div id="loader" class="loading-text">Verifying database...</div>

    <div id="result">
        <p><strong>ID:</strong> <span id="r_id"></span></p>
        <p><strong>Name:</strong> <span id="r_name"></span></p>
        <p><strong>Nickname:</strong> <span id="r_nick"></span></p>
        <hr style="border:0; border-top:1px solid #eee;">
        <div id="actsDisplay"></div>
    </div>
</div>

<script>
    function check() {
        const id = document.getElementById('sid').value;
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if(!id) return alert("Please enter Student ID");

        loader.style.display = "block";
        resDiv.style.display = "none";

        // เรียกใช้ฟังก์ชัน checkStatus จาก Code.gs
        google.script.run.withSuccessHandler(function(data) {
            loader.style.display = "none";
            
            if(data.status === "success") {
                document.getElementById('r_id').innerText = data.id;
                document.getElementById('r_name').innerText = data.name;
                document.getElementById('r_nick').innerText = data.nickname;
                
                // จับคู่ข้อมูลกับป้ายชื่อกิจกรรม
                const activities = [
                    { label: "FE CAMP 2026", status: data.campStatus },
                    { label: "FE07 FIRST MEET", status: data.meetStatus },
                    { label: "WORKSHOP SHIRT", status: data.shirtStatus }
                ];

                let html = "";
                activities.forEach(item => {
                    // เช็คคำว่า Paid (Case Sensitive ตามใน Sheet)
                    const isPaid = (item.status === "Paid"); 
                    html += `
                        <div class="card">
                            <strong>${item.label}</strong><br>
                            Status: <span class="${isPaid ? 'paid' : 'pending'}">
                                ${isPaid ? 'PAID ✅' : 'PENDING ⏳'}
                            </span>
                        </div>`;
                });

                document.getElementById('actsDisplay').innerHTML = html;
                resDiv.style.display = 'block';
            } else {
                alert("Student ID not found in our database.");
            }
        }).withFailureHandler(function(err) {
            loader.style.display = "none";
            alert("Error: " + err.message);
        }).checkStatus(id);
    }
</script>
</body>
</html>
